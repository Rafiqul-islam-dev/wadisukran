<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Server Down</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, Helvetica, sans-serif;
    }

    body{
        height:100vh;
        display:flex;
        align-items:center;
        justify-content:center;
        background:linear-gradient(135deg,#f8f9fa,#e9ecef);
        text-align:center;
        padding:20px;
    }

    .container{
        background:#ffffff;
        padding:40px 30px;
        border-radius:10px;
        box-shadow:0 10px 25px rgba(0,0,0,0.1);
        max-width:500px;
        width:100%;
    }

    h1{
        font-size:32px;
        color:#dc3545;
        margin-bottom:15px;
    }

    p{
        font-size:18px;
        color:#555;
        line-height:1.5;
    }

    .icon{
        font-size:60px;
        margin-bottom:15px;
    }

    @media (max-width:480px){
        h1{
            font-size:24px;
        }
        p{
            font-size:16px;
        }
    }
</style>
</head>

<body>

<div class="container">
    <div class="icon">⚠️</div>
    <h1>Server Down</h1>
    <p>Your server is temporarily unavailable due to a payment issue.</p>
    <p>Please Paid the payment.</p>
</div>

</body>
</html>
